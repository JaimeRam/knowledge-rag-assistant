services:
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: digimon-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO

  redis:
    image: redis:7.4-alpine
    container_name: digimon-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    container_name: digimon-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=digimon_db
      - POSTGRES_USER=digimon
      - POSTGRES_PASSWORD=digimon_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  langfuse:
    image: langfuse/langfuse:2.53.0
    container_name: digimon-langfuse
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://digimon:digimon_pass@postgres:5432/digimon_db
      - NEXTAUTH_SECRET=change_this_secret_in_production
      - NEXTAUTH_URL=http://localhost:3000
      - SALT=change_this_salt_in_production
    depends_on:
      - postgres

volumes:
  qdrant_data:
  redis_data:
  postgres_data:
