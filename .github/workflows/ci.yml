name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          # Dummy values so pydantic-settings does not fail on required fields.
          # Real secrets are never needed — tests are fully mocked.
          ANTHROPIC_API_KEY: test-key-ci
          VOYAGE_API_KEY: test-key-ci
        run: pytest tests/ -v --ignore=tests/test_ingestion.py --tb=short
